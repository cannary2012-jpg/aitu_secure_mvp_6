<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>AITU Grades Management</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 40px; background: #f0f2f5; }
        .container { max-width: 900px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        h2 { color: #004a99; border-bottom: 2px solid #004a99; padding-bottom: 10px; }
        .form-group { margin-bottom: 15px; }
        input { padding: 10px; width: 200px; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 10px 20px; background: #004a99; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background: #003366; }
        table { width: 100%; border-collapse: collapse; margin-top: 25px; background: white; }
        th, td { padding: 12px; border: 1px solid #dee2e6; text-align: left; }
        th { background-color: #004a99; color: white; }
        tr:nth-child(even) { background-color: #f8f9fa; }
        .error { color: #d9534f; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Система управления оценками AITU (Задание 1)</h2>
        
        <div id="login-section">
            <h3>Вход в систему</h3>
            <div class="form-group">
                <input type="text" id="username" placeholder="Логин">
                <input type="password" id="password" placeholder="Пароль">
                <button onclick="login()">Войти</button>
            </div>
            <p id="message" class="error"></p>
        </div>

        <div id="content-section" style="display:none;">
            <p>Добро пожаловать, <strong><span id="user-display"></span></strong>!</p>
            <button onclick="loadGrades()">Обновить список оценок</button>
            <button onclick="logout()" style="background:#6c757d;">Выйти</button>
            
            <table id="grades-table">
                <thead>
                    <tr>
                        <th>ID Студента</th>
                        <th>Дисциплина</th>
                        <th>Баллы (0-100)</th>
                    </tr>
                </thead>
                <tbody id="grades-body"></tbody>
            </table>
        </div>
    </div>

    <script>
        let token = '';

        async function login() {
            const formData = new FormData();
            formData.append('username', document.getElementById('username').value);
            formData.append('password', document.getElementById('password').value);

            try {
                const response = await fetch('/token', { method: 'POST', body: formData });
                const data = await response.json();

                if (response.ok) {
                    token = data.access_token;
                    document.getElementById('login-section').style.display = 'none';
                    document.getElementById('content-section').style.display = 'block';
                    document.getElementById('user-display').innerText = document.getElementById('username').value;
                    document.getElementById('message').innerText = '';
                    loadGrades();
                } else {
                    document.getElementById('message').innerText = 'Ошибка: ' + (data.detail || 'Неверный логин или пароль');
                }
            } catch (err) {
                document.getElementById('message').innerText = 'Ошибка соединения с сервером';
            }
        }

        async function loadGrades() {
            const response = await fetch('/grades/', {
                headers: { 'Authorization': 'Bearer ' + token }
            });
            const grades = await response.json();
            const body = document.getElementById('grades-body');
            body.innerHTML = '';
            
            if (response.ok) {
                grades.forEach(g => {
                    body.innerHTML += `<tr><td>${g.student_id}</td><td>${g.subject}</td><td>${g.score}</td></tr>`;
                });
            } else {
                alert('Ошибка загрузки данных: ' + (grades.detail || 'Доступ запрещен'));
            }
        }

        function logout() {
            token = '';
            location.reload();
        }
    </script>
</body>
</html>
